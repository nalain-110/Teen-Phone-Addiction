<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PhoneWatch AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1421;
      --card: #111827;
      --border: #1e293b;
      --accent: #00e5ff;
      --accent2: #ff4d6d;
      --accent3: #a855f7;
      --warn: #f59e0b;
      --success: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 0.4rem 1rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--accent);
      background: rgba(0,229,255,0.08);
    }

    .nav-badge {
      background: var(--accent2);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }

    main {
      position: relative;
      z-index: 1;
      padding-top: 64px;
    }

    /* UTILITIES */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.2);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .card:hover { border-color: rgba(0,229,255,0.2); }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before { opacity: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00b4cc);
      color: #000;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,229,255,0.3);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* GLOW effects */
    .glow-cyan { box-shadow: 0 0 30px rgba(0,229,255,0.15); }
    .glow-red { box-shadow: 0 0 30px rgba(255,77,109,0.15); }
    .glow-purple { box-shadow: 0 0 30px rgba(168,85,247,0.15); }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer span { color: var(--accent2); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .animate-fade-up { animation: fadeUp 0.6s ease both; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">
      <div class="nav-logo">📱</div>
      <span class="nav-title">PhoneWatch AI</span>
    </a>
    <ul class="nav-links">
      <li><a href="/" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a></li>
      <li><a href="/dashboard" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a></li>
      <li>
        <a href="/predict" class="{% if request.endpoint == 'predict' %}active{% endif %}">
          Predict <span class="nav-badge">AI</span>
        </a>
      </li>
      <li><a href="/about" class="{% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
    </ul>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer>
    <p>PhoneWatch AI &mdash; Teen Phone Addiction Detection &mdash; Built with <span>♥</span> using Flask & Machine Learning</p>
  </footer>
</body>
</html>
